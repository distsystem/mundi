context:
  git_url: https://gitlab.freedesktop.org/gstreamer/gstreamer.git
  git_tag: "1.28.2"
  version: ${{ git_tag }}
  build_number: 7

recipe:
  name: gstreamer-plugins
  version: ${{ version }}

source:
  - git: ${{ git_url }}
    tag: ${{ git_tag }}
    lfs: false

outputs:
  - package:
      name: gst-plugins-bad
    build:
      number: ${{ build_number }}
      script:
        # conda-forge patches g-ir-scanner shebang to '#!/usr/bin/env python3'.
        # Prepend host bin so 'env python3' resolves to the Python ABI that
        # matches g-ir-scanner's compiled extension. setuptools supplies the
        # distutils shim needed by giscanner on Python versions without stdlib
        # distutils.
        - export PATH="${PREFIX}/bin:${PATH}"
        - cd subprojects/gst-plugins-bad
        - mkdir -p build
        - cd build
        - export PKG_CONFIG_PATH="${PREFIX}/lib/pkgconfig:${BUILD_PREFIX}/lib/pkgconfig"
        - |
          meson setup .. \
            --buildtype=release \
            --prefix="${PREFIX}" \
            --libdir=lib \
            --wrap-mode=nofallback \
            -Dexamples=disabled \
            -Dtests=disabled \
            -Dorc=disabled \
            -Dgpl=enabled \
            -Dwebrtc=enabled \
            -Dsrtp=enabled \
            -Ddtls=enabled
        - ninja -j${CPU_COUNT}
        - ninja install
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - pkg-config
        - meson
        - ninja
        - gettext
        - perl
        - libtool
      host:
        - python
        - setuptools
        - gobject-introspection
        - gstreamer ==${{ version }}
        - gst-plugins-base ==${{ version }}
        - glib
        - libgl-devel
        - libegl-devel
        - libdrm
        - libxcb
        - pthread-stubs
        - openssl
        - libxml2
        - libsndfile
        - libopus
        - libnice
        - libsrtp2
        - zlib
        - expat
        - xorg-xorgproto
        - xorg-libx11
        - xorg-libxfixes
        - xorg-libxext
        - xorg-libxrender
        - xorg-libxdamage
        - xorg-libxxf86vm
        - xorg-libxau
      run:
        - gstreamer ==${{ version }}
        - gst-plugins-base ==${{ version }}
      run_exports:
        - ${{ pin_subpackage('gst-plugins-bad', upper_bound='x.x') }}
      ignore_run_exports:
        from_package:
          - libxml2
          - python
          - gobject-introspection
    tests:
      - script:
          - gst-inspect-1.0 webrtc
          - gst-inspect-1.0 webrtcbin
          - gst-inspect-1.0 srtp
          - gst-inspect-1.0 dtls

  - package:
      name: gst-plugins-ugly
    build:
      number: ${{ build_number }}
      script:
        - cd subprojects/gst-plugins-ugly
        - mkdir -p build
        - cd build
        - export PKG_CONFIG_PATH="${PREFIX}/lib/pkgconfig:${BUILD_PREFIX}/lib/pkgconfig"
        - |
          meson setup .. \
            --buildtype=release \
            --prefix="${PREFIX}" \
            --libdir=lib \
            --wrap-mode=nofallback \
            -Dtests=disabled \
            -Dorc=disabled \
            -Dgpl=enabled \
            -Dx264=enabled
        - ninja -j${CPU_COUNT}
        - ninja install
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - pkg-config
        - meson
        - ninja
        - gettext
        - perl
        - libtool
      host:
        - gstreamer ==${{ version }}
        - gst-plugins-base ==${{ version }}
        - glib
        - libxml2
        - zlib
        - x264
      run:
        - gstreamer ==${{ version }}
        - gst-plugins-base ==${{ version }}
      run_exports:
        - ${{ pin_subpackage('gst-plugins-ugly', upper_bound='x.x') }}
      ignore_run_exports:
        from_package:
          - libxml2
    tests:
      - script:
          - gst-inspect-1.0 x264enc
          - gst-inspect-1.0 asfdemux
          - gst-inspect-1.0 realmedia
